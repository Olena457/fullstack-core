version: "3.9"

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: backend_service
    ports:
      - "4000:4000"
    env_file:
      - ./apps/backend/.env
    restart: always

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:4000
    container_name: frontend_service
    ports:
      - "5173:5173"
    env_file:
      - ./apps/frontend/.env
    depends_on:
      - backend
    restart: always